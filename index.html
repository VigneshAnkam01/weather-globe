<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive 3D Earth weather explorer. Click anywhere on the globe to see real-time local weather data for any location worldwide." />
  <meta name="theme-color" content="#0a0e1a" />
  <meta property="og:title" content="WeatherGlobe — Interactive 3D Earth Weather Explorer" />
  <meta property="og:description" content="Click anywhere on a stunning 3D globe to see real-time weather for any location on Earth." />
  <title>WeatherGlobe — Interactive 3D Earth Weather Explorer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Load Three.js first so globe.gl shares the same THREE namespace -->
  <script src="https://unpkg.com/three@0.162.0/build/three.min.js"></script>
  <!-- Import Globe.gl from UMD CDN -->
  <script src="https://unpkg.com/globe.gl@2.41.3/dist/globe.gl.min.js"></script>
  <!-- Design System & Complete Stylesheet -->
  <style>
    /* ---------- CSS Custom Properties ---------- */
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --bg-glass: rgba(17, 24, 39, 0.75);
      --bg-glass-hover: rgba(17, 24, 39, 0.85);

      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-amber: #f59e0b;
      --accent-red: #ef4444;
      --accent-green: #10b981;
      --accent-purple: #8b5cf6;

      --gradient-warm: linear-gradient(135deg, #f59e0b, #ef4444);
      --gradient-cool: linear-gradient(135deg, #06b6d4, #3b82f6);
      --gradient-mixed: linear-gradient(135deg, #3b82f6, #8b5cf6);

      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-tertiary: #6b7280;

      --border-glass: rgba(255, 255, 255, 0.08);
      --border-glass-hover: rgba(255, 255, 255, 0.15);

      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.3);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.theme-day {
      --bg-primary: #bae6fd;
      --bg-secondary: #f0f9ff;
      --bg-tertiary: #e0f2fe;
      --bg-glass: rgba(240, 249, 255, 0.75);
      --bg-glass-hover: rgba(240, 249, 255, 0.88);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #64748b;
      --border-glass: rgba(15, 23, 42, 0.08);
      --border-glass-hover: rgba(15, 23, 42, 0.16);
      --shadow-glow: 0 0 35px rgba(245, 158, 11, 0.35);
      --accent-blue: #0284c7;
    }

    body.theme-night {
      --bg-primary: #020617;
      --bg-secondary: #0f172a;
      --bg-tertiary: #1e293b;
      --bg-glass: rgba(15, 23, 42, 0.75);
      --bg-glass-hover: rgba(15, 23, 42, 0.85);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --border-glass: rgba(255, 255, 255, 0.08);
      --border-glass-hover: rgba(255, 255, 255, 0.15);
      --shadow-glow: 0 0 35px rgba(139, 92, 246, 0.3);
    }

    /* ---------- Reset & Base ---------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* Transition Day/Night Theme */
    body, .search-box, .weather-panel, .history-panel, .detail-card, .forecast-day, .history-item {
      transition: background var(--transition-slow), border-color var(--transition-normal), color var(--transition-normal), transform var(--transition-fast), box-shadow var(--transition-normal);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.6); }

    /* ---------- Visual Error Catcher Toast ---------- */
    .error-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-150px);
      z-index: 20000;
      background: rgba(239, 68, 68, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-lg);
      padding: 14px 24px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
      transition: transform var(--transition-normal);
      white-space: nowrap;
    }
    .error-toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    /* ---------- Celestial Background Wrapper ---------- */
    #sky-celestial-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
      transition: background var(--transition-slow);
    }

    body.theme-day #sky-celestial-bg {
      background: radial-gradient(circle at 10% 10%, #e0f2fe 0%, #38bdf8 40%, #0284c7 100%);
    }

    body.theme-night #sky-celestial-bg {
      background: radial-gradient(circle at 10% 10%, #0f172a 0%, #050510 60%, #000 100%);
    }

    /* Celestial Elements */
    .celestial-sun {
      position: absolute;
      top: 50px;
      left: 60px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, #fffbeb 20%, #fef08a 50%, #f59e0b 80%);
      border-radius: 50%;
      box-shadow: 0 0 60px #f59e0b, 0 0 120px rgba(245, 158, 11, 0.6), 0 0 200px rgba(245, 158, 11, 0.3);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.theme-day .celestial-sun {
      opacity: 1;
      transform: scale(1);
    }

    .celestial-moon {
      position: absolute;
      top: 50px;
      left: 60px;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, #f8fafc 40%, #cbd5e1 75%, #94a3b8 100%);
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(248, 250, 252, 0.8), 0 0 80px rgba(139, 92, 246, 0.4), 0 0 150px rgba(139, 92, 246, 0.2);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Moon Crater Details */
    .celestial-moon::before {
      content: '';
      position: absolute;
      top: 25px;
      left: 30px;
      width: 24px;
      height: 24px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      box-shadow: 40px 20px 0 rgba(0, 0, 0, 0.06), 15px 50px 0 rgba(0, 0, 0, 0.07), -10px 30px 0 rgba(0, 0, 0, 0.05);
    }

    body.theme-night .celestial-moon {
      opacity: 1;
      transform: scale(1);
    }

    /* Starfield and cloud animations */
    .celestial-cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 100px;
      filter: blur(12px);
      animation: floatClouds 120s linear infinite;
      opacity: 0;
      transition: opacity 1.5s;
    }

    body.theme-day .celestial-cloud {
      opacity: 0.7;
    }

    @keyframes floatClouds {
      0% { transform: translateX(-200px) translateY(50px); }
      100% { transform: translateX(110vw) translateY(50px); }
    }

    /* Starfield for Night */
    .celestial-star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 4s ease-in-out infinite;
      opacity: 0;
      transition: opacity 1.5s;
    }

    body.theme-night .celestial-star {
      opacity: 0.8;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ---------- Loading Screen ---------- */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: radial-gradient(ellipse at center, #111827 0%, #0a0e1a 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 600ms ease, visibility 600ms ease;
    }

    #loading-screen.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-content { text-align: center; }

    .loading-spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-content h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    .loading-content p { font-size: 14px; color: var(--text-secondary); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- 3D Globe Container ---------- */
    #globe-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; cursor: grab; }
    #globe-container:active { cursor: grabbing; }

    /* ---------- Search Wrapper ---------- */
    #search-wrapper {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 440px;
      max-width: calc(100vw - 40px);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      padding: 12px 20px;
      box-shadow: var(--shadow-lg);
    }

    .search-box:focus-within {
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: var(--shadow-glow);
    }

    .search-icon { width: 20px; height: 20px; color: var(--text-secondary); flex-shrink: 0; }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 15px;
      min-width: 0;
    }
    .search-box input::placeholder { color: var(--text-tertiary); }

    #unit-toggle, #lucky-btn {
      background: transparent;
      border: 1px solid var(--border-glass);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: border-color var(--transition-fast), color var(--transition-fast);
      flex-shrink: 0;
    }
    #unit-toggle:hover, #lucky-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

    /* ---------- Search Autocomplete Dropdown ---------- */
    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      overflow-y: auto;
      max-height: 320px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity var(--transition-normal), transform var(--transition-normal);
    }
    .search-results.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .search-result-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-glass);
      transition: background var(--transition-fast);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(59, 130, 246, 0.1); }

    .result-icon { font-size: 16px; flex-shrink: 0; }
    .result-name { font-weight: 500; font-size: 14px; }
    .result-country { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* ---------- iOS Weather Panel ---------- */
    .weather-panel {
      position: fixed;
      right: -480px;
      top: 24px;
      bottom: auto;
      width: 420px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 48px);
      z-index: 90;
      transition: right var(--transition-slow), box-shadow 0.3s;
      overflow-y: auto;
      overflow-x: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      -webkit-overflow-scrolling: touch;
    }
    .weather-panel.visible { right: 24px; }
    .weather-panel.dragging {
      transition: none !important;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.2);
      cursor: grabbing;
    }

    .weather-panel-inner {
      min-height: 100%;
      padding: 0 0 30px;
    }

    /* Dynamic weather gradient backgrounds */
    .weather-panel.weather-bg-clear-day { background: linear-gradient(180deg, #4a90d9 0%, #74b9ff 40%, #a8d8ea 100%); }
    .weather-panel.weather-bg-clear-night { background: linear-gradient(180deg, #0c1445 0%, #1a237e 40%, #283593 100%); }
    .weather-panel.weather-bg-cloudy { background: linear-gradient(180deg, #546e7a 0%, #78909c 40%, #90a4ae 100%); }
    .weather-panel.weather-bg-rain { background: linear-gradient(180deg, #37474f 0%, #455a64 40%, #607d8b 100%); }
    .weather-panel.weather-bg-snow { background: linear-gradient(180deg, #90a4ae 0%, #b0bec5 40%, #cfd8dc 100%); }
    .weather-panel.weather-bg-thunder { background: linear-gradient(180deg, #1a1a2e 0%, #2d2d44 40%, #3d3d5c 100%); }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: background var(--transition-fast), transform 0.2s;
      z-index: 10;
    }
    .close-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.1); }

    /* Drag handle bar */
    .panel-drag-handle {
      width: 100%;
      padding: 10px 0 4px;
      cursor: grab;
      display: flex;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .panel-drag-handle:active { cursor: grabbing; }
    .panel-drag-handle .drag-bar {
      width: 36px;
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.3);
      transition: background 0.2s;
    }
    .panel-drag-handle:hover .drag-bar {
      background: rgba(255, 255, 255, 0.5);
    }

    /* Hero section */
    .ios-hero {
      text-align: center;
      padding: 50px 24px 20px;
      color: #fff;
    }
    .ios-hero .city-name {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .ios-hero .hero-temp {
      font-size: 80px;
      font-weight: 200;
      font-family: var(--font-sans);
      letter-spacing: -4px;
      line-height: 1;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }
    .ios-hero .hero-condition {
      font-size: 17px;
      font-weight: 500;
      opacity: 0.9;
      margin-top: 4px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }
    .ios-hero .hero-hilo {
      font-size: 17px;
      font-weight: 500;
      opacity: 0.85;
      margin-top: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }
    .weather-bg-snow .ios-hero { color: #1a1a2e; }

    /* iOS frosted card */
    .ios-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      margin: 8px 16px;
      overflow: hidden;
    }
    .weather-bg-snow .ios-card {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.1);
    }
    .ios-card-header {
      padding: 12px 16px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      gap: 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .weather-bg-snow .ios-card-header { color: rgba(0,0,0,0.5); border-bottom-color: rgba(0,0,0,0.08); }

    /* Hourly forecast strip */
    .hourly-strip {
      display: flex;
      overflow-x: auto;
      padding: 12px 16px 14px;
      gap: 20px;
      scrollbar-width: none;
    }
    .hourly-strip::-webkit-scrollbar { display: none; }
    .hourly-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 44px;
      flex-shrink: 0;
    }
    .hourly-item .h-time {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
    }
    .hourly-item .h-icon { width: 24px; height: 24px; }
    .hourly-item .h-icon svg { width: 100%; height: 100%; }
    .hourly-item .h-temp {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .weather-bg-snow .hourly-item .h-time { color: rgba(0,0,0,0.6); }
    .weather-bg-snow .hourly-item .h-temp { color: #1a1a2e; }

    /* 10-day forecast */
    .forecast-list { padding: 6px 16px 12px; }
    .forecast-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
    }
    .weather-bg-snow .forecast-row { color: #1a1a2e; border-bottom-color: rgba(0,0,0,0.06); }
    .forecast-row:last-child { border-bottom: none; }
    .forecast-row .fr-day { width: 50px; font-size: 15px; font-weight: 600; }
    .forecast-row .fr-icon { width: 28px; height: 28px; margin-right: 10px; }
    .forecast-row .fr-icon svg { width: 100%; height: 100%; }
    .forecast-row .fr-low {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.6;
      width: 32px;
      text-align: right;
      font-family: var(--font-mono);
    }
    .forecast-row .fr-bar {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      margin: 0 10px;
      position: relative;
      overflow: hidden;
    }
    .weather-bg-snow .forecast-row .fr-bar { background: rgba(0,0,0,0.1); }
    .forecast-row .fr-bar-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 3px;
      background: linear-gradient(90deg, #60a5fa, #f59e0b);
    }
    .forecast-row .fr-high {
      font-size: 14px;
      font-weight: 600;
      width: 32px;
      font-family: var(--font-mono);
    }

    /* Detail cards 2-column grid */
    .ios-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px;
      margin-top: 8px;
    }
    .ios-detail-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 14px;
      min-height: 120px;
    }
    .weather-bg-snow .ios-detail-card { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.1); }
    .ios-detail-card .dc-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }
    .weather-bg-snow .ios-detail-card .dc-label { color: rgba(0,0,0,0.5); }
    .ios-detail-card .dc-value {
      font-size: 28px;
      font-weight: 300;
      color: #fff;
      line-height: 1.1;
    }
    .weather-bg-snow .ios-detail-card .dc-value { color: #1a1a2e; }
    .ios-detail-card .dc-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 6px;
      line-height: 1.4;
    }
    .weather-bg-snow .ios-detail-card .dc-desc { color: rgba(0,0,0,0.55); }

    /* UV Index meter */

  <!-- Global Visual Error Catcher -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const msg = "❌ Error: " + message + " at " + (source ? source.split('/').pop() : 'unknown') + ":" + lineno;
      console.error(msg);
      setTimeout(() => {
        const toast = document.getElementById('error-toast');
        if (toast) {
          toast.textContent = msg;
          toast.classList.add('visible');
          toast.style.background = 'rgba(239, 68, 68, 0.95)';
          toast.style.color = '#ffffff';
          toast.style.boxShadow = '0 0 30px rgba(239, 68, 68, 0.5)';
        } else {
          alert(msg);
        }
      }, 300);
      return false;
    };
    window.onunhandledrejection = function(event) {
      const msg = "❌ Rejection: " + (event.reason ? event.reason.message || event.reason : 'unknown promise error');
      console.error(msg);
      setTimeout(() => {
        const toast = document.getElementById('error-toast');
        if (toast) {
          toast.textContent = msg;
          toast.classList.add('visible');
          toast.style.background = 'rgba(239, 68, 68, 0.95)';
          toast.style.color = '#ffffff';
          toast.style.boxShadow = '0 0 30px rgba(239, 68, 68, 0.5)';
        } else {
          alert(msg);
        }
      }, 300);
    };
  </script>

        filtered.unshift(entry);

    /* ---------- API Integrations ---------- */

    // Fetch Weather Data from Open-Meteo
    async function fetchWeather(lat, lng) {
      const cacheKey = `weather_${lat.toFixed(2)}_${lng.toFixed(2)}`;
      try {
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
          const item = JSON.parse(cached);
          if (item.expires_at > Date.now()) return item.data;
        }
      } catch {}

      const params = new URLSearchParams({
        latitude: lat,
        longitude: lng,
        current: 'temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,cloud_cover,precipitation,surface_pressure,is_day',
        hourly: 'temperature_2m,weather_code',
        daily: 'temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,wind_speed_10m_max,sunrise,sunset,uv_index_max',
        forecast_days: 10,
        forecast_hours: 48,
        timezone: 'auto'
      });

      const res = await fetchWithTimeout(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error('Weather API call failed');
      const raw = await res.json();

      const data = {
        current: {
          temperature: raw.current.temperature_2m,
          feelsLike: raw.current.temperature_2m, // apparent temperature mapping
          humidity: raw.current.relative_humidity_2m,
          weatherCode: raw.current.weather_code,
          windSpeed: raw.current.wind_speed_10m,
          windDirection: raw.current.wind_direction_10m,
          cloudCover: raw.current.cloud_cover,
          precipitation: raw.current.precipitation,
          pressure: raw.current.surface_pressure,
          isDay: raw.current.is_day === 1
        },
        daily: raw.daily.time.map((date, i) => ({
          date,
          tempMax: raw.daily.temperature_2m_max[i],
          tempMin: raw.daily.temperature_2m_min[i],
          weatherCode: raw.daily.weather_code[i],
          precipitation: raw.daily.precipitation_sum[i],
          windSpeed: raw.daily.wind_speed_10m_max[i],
          sunrise: raw.daily.sunrise[i],
          sunset: raw.daily.sunset[i],
          uvIndex: raw.daily.uv_index_max[i]
        })),
        hourly: raw.hourly.time.map((time, i) => ({
          time,
          temp: raw.hourly.temperature_2m[i],
          weatherCode: raw.hourly.weather_code[i]
        })),
        timezone: raw.timezone
      };

      try {
        const item = { data, expires_at: Date.now() + 30 * 60 * 1000 };
        localStorage.setItem(cacheKey, JSON.stringify(item));
      } catch {}

      return data;
    }

    // Fetch Air Quality from Open-Meteo AQI API
    async function fetchAirQuality(lat, lng) {
      try {
        const res = await fetchWithTimeout(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}&current=us_aqi,pm2_5,pm10`, { timeout: 4000 });
        if (!res.ok) return null;
        const raw = await res.json();
        return {
          aqi: raw.current.us_aqi,
          pm25: raw.current.pm2_5,
          pm10: raw.current.pm10
        };
      } catch { return null; }
    }

    // Performance Cleanup for Expired Caches
    function cleanupExpiredCaches() {
      try {
        const keys = Object.keys(localStorage);
        keys.forEach(key => {
          if (key.startsWith('weather_')) {
            try {
              const item = JSON.parse(localStorage.getItem(key));
              if (item && item.expires_at && item.expires_at < Date.now()) {
                localStorage.removeItem(key);
              }
            } catch { localStorage.removeItem(key); }
          }
        });
      } catch {}
    }

    // Reverse Geocode using BigDataCloud + Nominatim Fallback
    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetchWithTimeout(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`);
        if (res.ok) {
          const data = await res.json();
          const city = data.locality || data.city || data.principalSubdivision || '';
          const state = data.principalSubdivision || '';
          const country = data.countryName || '';
          const countryCode = data.countryCode ? data.countryCode.toLowerCase() : '';
          const displayName = [city, state, country].filter(Boolean).join(', ');
          if (displayName) return { city, state, country, displayName, countryCode };
        }
      } catch {}

      try {
        const res = await fetchWithTimeout(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=10&email=weatherglobe_myth@gmail.com`);
        if (res.ok) {
          const data = await res.json();
          const addr = data.address || {};
          const city = addr.city || addr.town || addr.village || addr.county || '';
          const state = addr.state || '';
          const country = addr.country || '';
          const countryCode = addr.country_code ? addr.country_code.toLowerCase() : '';
          const displayName = [city, state, country].filter(Boolean).join(', ');
          return { city, state, country, displayName, countryCode };
        }
      } catch {}

      return {
        city: 'Unknown Location',
        state: '',
        country: '',
        displayName: `${lat.toFixed(2)}°, ${lng.toFixed(2)}°`,
        countryCode: ''
      };
    }

    // Helper to simplify highly detailed GeoJSON boundary polygons to prevent blocking the WebGL rendering main thread!
    function simplifyGeoJSON(geometry, maxPoints = 120) {
      if (!geometry || !geometry.coordinates) return geometry;
      
      function simplifyRing(ring) {
        if (!ring || ring.length <= 4) return ring;
        const n = ring.length;
        if (n <= maxPoints) return ring;
        const step = Math.ceil(n / maxPoints);
        const simplified = [];
        for (let i = 0; i < n - 1; i += step) {
          simplified.push(ring[i]);
        }
        simplified.push(ring[n - 1]); // Maintain closed polygon state
        return simplified;
      }

      try {
        if (geometry.type === 'Polygon') {
          return {
            ...geometry,
            coordinates: geometry.coordinates.map(simplifyRing)
          };
        } else if (geometry.type === 'MultiPolygon') {
          return {
            ...geometry,
            coordinates: geometry.coordinates.map(polygon => polygon.map(simplifyRing))
          };
        }
      } catch (err) {
        console.warn('Error simplifying polygon geometry:', err);
      }
      return geometry;
    }

    // Fetch Layered Outlines (State + City) from Nominatim
    async function fetchBoundaryPolygons(lat, lng) {
      const result = { stateBoundary: null, cityBoundary: null };
      
      async function fetchBoundary(zoom, type) {
        try {
          await new Promise(resolve => setTimeout(resolve, zoom === 5 ? 200 : 0));
          const res = await fetchWithTimeout(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&polygon_geojson=1&zoom=${zoom}&email=weatherglobe_myth@gmail.com`);
          if (!res.ok) return null;
          const data = await res.json();
          if (!data.geojson || (data.geojson.type !== 'Polygon' && data.geojson.type !== 'MultiPolygon')) return null;

          const addr = data.address || {};
          const name = type === 'city'
            ? (addr.city || addr.town || addr.village || addr.municipality || 'Local Boundary')
            : (addr.state || addr.province || addr.region || 'State Boundary');

          return {
            type: 'Feature',
            properties: { type, name, displayName: data.display_name },
            geometry: simplifyGeoJSON(data.geojson)
          };
        } catch { return null; }
      }

      try {
        const [cityBoundary, stateBoundary] = await Promise.all([
          fetchBoundary(10, 'city'),
          fetchBoundary(5, 'state')
        ]);
        result.cityBoundary = cityBoundary;
        result.stateBoundary = stateBoundary;
      } catch {}

      return result;
    }

    // Autocomplete Location Forward Search
    async function searchLocations(query) {
      if (!query || query.length < 2) return [];
      try {
        const res = await fetchWithTimeout(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en`);
        if (!res.ok) return [];
        const data = await res.json();
        if (!data.results) return [];
        return data.results.map(r => ({
          name: r.name,
          lat: r.latitude,
          lng: r.longitude,
          country: r.country || '',
          state: r.admin1 || '',
          countryCode: r.country_code || ''
        }));
      } catch { return []; }
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatTimeAgo(isoString) {
      try {
        const date = new Date(isoString);
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      } catch { return 'recently'; }
    }

      try {
        const [historyRes, pinsRes] = await Promise.all([
          fetch(`${BACKEND_URL}/api/history`).then(r => r.ok ? r.json() : []),

        ]).catch(() => [[], []]);

        globalHistory = historyRes || [];
        globalPins = pinsRes || [];

        // Plot pins directly as community stars on the 3D globe!
        updateGlobePins();
      } catch {

    function updateGlobePins() {
      if (!globe) return;
      
      const pinPoints = globalPins.map(p => ({
        lat: Number(p.lat),
        lng: Number(p.lng),
        size: 0.1,
        color: '#f59e0b', // amber for community reports
        radius: 0.3,
        name: `👤 ${p.username}: "${p.message}" (${p.temp})`
      }));

      // Add a highly visible red pinpoint for the currently searched/clicked location!
      if (currentLat !== null && currentLng !== null) {
        pinPoints.push({
          lat: currentLat,
          lng: currentLng,
          size: 0.25,       // larger size standing out
          color: '#ef4444', // vibrant red pinpoint!
          radius: 0.5,      // larger radius
          name: `📍 Selected Location: ${currentLat.toFixed(2)}°, ${currentLng.toFixed(2)}°`
        });
      }

      globe.pointsData(pinPoints);
    }

    async function postSharedSearch(lat, lng, city, temp, condition) {
      try {
        const res = await fetch(`${BACKEND_URL}/api/history`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng, city, temp, condition })
        });
        if (res.ok) {
          const entry = await res.json();
          globalHistory.unshift(entry);
          if (globalHistory.length > 15) globalHistory.pop();
        }
      } catch {}
    }

    /* ---------- Globe Actions Coordinator ---------- */

    async function handleGlobeClick(lat, lng) {
      // Validate and sanitize input coordinates
      const safeLat = parseFloat(lat);
      const safeLng = parseFloat(lng);
      if (isNaN(safeLat) || isNaN(safeLng)) {
        console.warn('Invalid coordinates passed to handleGlobeClick:', lat, lng);
        return;
      }

      // Stop globe auto-rotation immediately on any active click/search/pin/ticker interaction!
      if (globe) {
        try {
          const controls = globe.controls();
          if (controls) {
            controls.autoRotate = false;
            controls.update();
          }
        } catch {}
      }

      if (isLoading) return;

      // Close the history sidebar bottom sheet on mobile to prevent overlapping sheets!
      if (window.innerWidth <= 768) {
        const historyPanel = document.getElementById('history-panel');
        if (historyPanel) historyPanel.classList.remove('visible');
      }

      // Normalize longitude to [-180, 180] range to prevent out-of-bounds API requests on spun clicks!
      const normalizedLng = ((safeLng + 180) % 360 + 360) % 360 - 180;

      currentLat = safeLat;
      currentLng = normalizedLng;
      isLoading = true;

      // Update pins instantly to pinpoint this exact target on the globe!
      updateGlobePins();

      try {
        // Start skeleton loaders
        showLoading();

        // WebGL Globe Fly-To camera transition and rings ripple plot (deferred to prevent WebGL blocking)
        if (globe) {
          const currentPov = globe.pointOfView();
          let targetAltitude = 0.2;
          if (currentPov && typeof currentPov.altitude === 'number' && !isNaN(currentPov.altitude)) {
            // Keep the user's high-resolution close zoom, bounded safely between 0.05 (near street) and 0.25 (overview)
            targetAltitude = Math.max(Math.min(currentPov.altitude, 0.25), 0.05);
          }
          
          setTimeout(() => {
            if (globe) {
              globe.pointOfView({ lat: safeLat, lng: normalizedLng, altitude: targetAltitude }, 1400);
              globe.ringsData([{ lat: safeLat, lng: normalizedLng, maxR: 4, propagationSpeed: 3, repeatPeriod: 1200 }]);
            }
          }, 50);
        }

        // Fetch weather + location reverse lookup + borders outlines in non-blocking parallel!
        const [weather, location, airQuality] = await Promise.all([
          fetchWeather(currentLat, currentLng).catch(err => {
            console.warn('Weather API failed, returning offline fallback data:', err);
            return {
              current: {
                temperature: 20,
                feelsLike: 20,
                humidity: 50,
                weatherCode: 0,
                windSpeed: 10,
                windDirection: 0,
                cloudCover: 0,
                precipitation: 0,
                pressure: 1013,
                isDay: true,
                error: true
              },
              daily: Array(7).fill(null).map((_, i) => {
                const date = new Date();
                date.setDate(date.getDate() + i);
                return {
                  date: date.toISOString().split('T')[0],
                  tempMax: 22,
                  tempMin: 18,
                  weatherCode: 0,
                  precipitation: 0,
                  windSpeed: 10
                };
              }),
              timezone: 'UTC'
            };
          }),
          reverseGeocode(currentLat, currentLng).catch(err => {
            console.warn(err);
            return { city: 'Unknown Location', displayName: `${currentLat.toFixed(2)}°, ${currentLng.toFixed(2)}°` };
          }),
          fetchAirQuality(currentLat, currentLng).catch(() => null)
        ]);

        currentWeatherData = weather;
        if (currentWeatherData) currentWeatherData.airQuality = airQuality;
        
        // Defensive safeties
        const safeLocation = location || { city: 'Unknown Location', displayName: `${currentLat.toFixed(2)}°, ${currentLng.toFixed(2)}°` };
        safeLocation.lat = currentLat;
        safeLocation.lng = currentLng;
        currentLocationData = safeLocation;

        // Reset any country highlights to maintain a clean globe model
        if (globe) {
          globe.selectedCountryCode = '';
          globe.currentStateBoundary = null;
          globe.currentCityBoundary = null;
        }

        // Update theme
        if (weather && weather.current) {
          updateAppTheme(weather.current.isDay);
        }

        // Render card
        showWeatherCard(weather, safeLocation);

        // Record history locally
        const tempText = `${Math.round(weather.current.temperature)}°`;
        const conditionText = getWeatherDescription(weather.current.weatherCode);

        addToHistory({
          lat: currentLat,
          lng: currentLng,
          city: safeLocation.city || safeLocation.displayName,
          temp: tempText,
          condition: conditionText
        });

        // Push telemetry global logs asynchronously
        postSharedSearch(currentLat, currentLng, safeLocation.city || safeLocation.displayName, tempText, conditionText);

        refreshSidebar();
      } catch (err) {
        console.error(err);
        showError('Failed to fetch weather data. Please try again.');
      } finally {
        isLoading = false;
      }
    }

    async function fetchExtremeWeather() {
      try {
        const lats = EXTREME_CITIES.map(c => c.lat).join(',');
        const lngs = EXTREME_CITIES.map(c => c.lng).join(',');
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lngs}&current=temperature_2m,weather_code&timezone=auto`;
        const res = await fetchWithTimeout(url, { timeout: 8000 });
        if (!res.ok) return;
        const raw = await res.json();

        // Open-Meteo returns an array when given multiple lat/lngs
        const results = Array.isArray(raw) ? raw : [raw];
        const entries = [];
        results.forEach((r, i) => {
          if (!r || !r.current) return;
          const city = EXTREME_CITIES[i];
          entries.push({
            city: city.city,
            country: city.country,
            lat: city.lat,
            lng: city.lng,
            temp: r.current.temperature_2m,
            weatherCode: r.current.weather_code
          });
        });

        if (entries.length === 0) return;

        // Sort by temperature — highest first
        entries.sort((a, b) => b.temp - a.temp);

        const hottest = entries.slice(0, 3).map(e => ({ ...e, type: 'hot' }));
        const coldest = entries.slice(-3).reverse().map(e => ({ ...e, type: 'cold' }));

        // Interleave hot, cold, hot, cold, hot, cold for nice visual contrast
        extremeData = [];
        for (let i = 0; i < 3; i++) {
          extremeData.push(hottest[i]);
          extremeData.push(coldest[i]);
        }

        // Build navigation dots
        const nav = document.getElementById('ticker-nav');
        if (nav) {
          nav.innerHTML = extremeData.map((_, i) =>
            `<span class="nav-dot ${i === 0 ? 'active' : ''}"></span>`
          ).join('');
        }

        // Show ticker
        const ticker = document.getElementById('extreme-ticker');
        if (ticker) {
          ticker.style.opacity = '1';
          ticker.style.pointerEvents = 'auto';
        }

        renderTickerSlide(0);
        startTickerAutoSlide();

        // Click handler — fly globe to the currently shown city
        if (ticker) {
          ticker.addEventListener('click', () => {
            const item = extremeData[tickerIndex];
            if (item) handleGlobeClick(item.lat, item.lng);
          });
        }
      } catch (err) {
        console.warn('Could not load extreme weather ticker:', err);
      }
    }

    function renderTickerSlide(index) {
      const item = extremeData[index];
      if (!item) return;

      const slide = document.getElementById('ticker-slide');
      const label = document.getElementById('ticker-label');
      const dot = document.getElementById('ticker-dot');
      const cityEl = document.getElementById('ticker-city');
      const tempEl = document.getElementById('ticker-temp');
      const condEl = document.getElementById('ticker-condition');
      const navDots = document.querySelectorAll('#ticker-nav .nav-dot');

      if (!slide) return;

      // Fade out
      slide.classList.add('fade-out');

      setTimeout(() => {
        const isHot = item.type === 'hot';

        if (label) label.textContent = isHot ? '🔥 Hottest Now' : '🧊 Coldest Now';
        if (dot) {
          dot.classList.toggle('hot', isHot);
          dot.classList.toggle('cold', !isHot);
        }
        if (cityEl) cityEl.textContent = `${item.city}, ${item.country}`;
        if (tempEl) {
          const unit = getUnit();
          const displayTemp = unit === 'F' ? Math.round(item.temp * 9/5 + 32) : Math.round(item.temp);
          tempEl.textContent = `${displayTemp}°${unit}`;
          tempEl.classList.toggle('hot', isHot);
          tempEl.classList.toggle('cold', !isHot);
        }
        if (condEl) condEl.textContent = getWeatherDescription(item.weatherCode);

        navDots.forEach((d, i) => d.classList.toggle('active', i === index));

        // Fade in
        slide.classList.remove('fade-out');
      }, 350);
    }

    function startTickerAutoSlide() {
      if (tickerInterval) clearInterval(tickerInterval);
      tickerInterval = setInterval(() => {
        tickerIndex = (tickerIndex + 1) % extremeData.length;
        renderTickerSlide(tickerIndex);
      }, 4000);
    }

    /* ---------- Application Boot Orchestration ---------- */

    function boot() {

            .pointColor('color')
            .pointAltitude('size')
            .pointRadius('radius')
            .pointLabel('name')
            .onPointClick(d => handleGlobeClick(d.lat, d.lng))
            // City labels (shown when zoomed in)
            .labelsData([])
            .labelLat(d => d.lat)
            .labelLng(d => d.lng)

            .labelColor(d => d._isCountry ? 'rgba(255, 255, 255, 0.55)' : 'rgba(255, 255, 255, 0.95)')
            .labelResolution(3)
            .labelAltitude(d => d._isCountry ? 0.005 : 0.01)
            .onLabelClick(d => handleGlobeClick(d.lat, d.lng))
            // Country name HTML elements on globe surface
            .htmlElementsData(COUNTRY_LABELS)
            .htmlLat(d => d.lat)
            .htmlLng(d => d.lng)
            .htmlAltitude(0.005)
            .htmlElement(d => {
              const el = document.createElement('div');
              el.className = 'country-label-3d';
              el.textContent = d.name;
              el.style.cssText = 'color: rgba(255,255,255,0.6); font-size: 9px; font-family: Inter, sans-serif; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5); pointer-events: none; white-space: nowrap; transform: translate(-50%, -50%);';
              return el;
            });

          // Set up Globe click handler
          globe.onGlobeClick(({ lat, lng }) => {
            try {
              const controls = globe.controls();
              if (controls) controls.autoRotate = false;
            } catch {}
            
            // Dismiss open weather panel, then load new location
            const panel = document.getElementById('weather-panel');
            if (panel && panel.classList.contains('visible')) {
              panel.classList.remove('visible');
            }
            handleGlobeClick(lat, lng);
          });

          // Configure OrbitControls for ground-level close zoom
          const controls = globe.controls();
          if (controls) {
            controls.minDistance = 101.5; // Unlocks deep, detailed close zooming!
            controls.maxDistance = 2000;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;
            controls.enableDamping = false; // Disable damping to prevent conflicts with programmatic camera transitions
            controls.zoomSpeed = 2.5;
          }

          // Toggle 3D city labels so space view stays clean
          globe.onZoom((pov) => {
            if (pov && pov.altitude <= 1.8) {
              if (globe.labelsData().length === 0) globe.labelsData(MAJOR_CITIES);
            } else {
              if (globe.labelsData().length > 0) globe.labelsData([]);
            }
          });

          // 2. Realistic Sun Lighting, Clouds & Starfield
          setTimeout(() => {
            try {
              // Enable atmosphere
              globe.showAtmosphere(true)
                   .atmosphereColor('#63a4ff')
                   .atmosphereAltitude(0.15);

              if (typeof THREE === 'undefined') return;
              const scene = globe.scene();

              // --- Real Sun Position based on UTC time ---
              function getSunPosition() {
                const now = new Date();
                const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
                const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60;
                // Sun longitude: noon at 0° when UTC=12
                const sunLng = (12 - utcHours) * 15;
                // Sun latitude: approximate declination
                const declination = 23.44 * Math.sin((2 * Math.PI / 365) * (dayOfYear - 81));
                return { lat: declination, lng: sunLng };
              }

              const sunPos = getSunPosition();
              const sunLatRad = sunPos.lat * Math.PI / 180;
              const sunLngRad = sunPos.lng * Math.PI / 180;
              const sunDist = 400;
              const sunX = sunDist * Math.cos(sunLatRad) * Math.sin(sunLngRad);
              const sunY = sunDist * Math.sin(sunLatRad);
              const sunZ = sunDist * Math.cos(sunLatRad) * Math.cos(sunLngRad);

              // --- Directional Sun Light with shadow ---
              const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.2);
              sunLight.position.set(sunX, sunY, sunZ);
              sunLight.castShadow = true;
              sunLight.shadow.mapSize.width = 2048;
              sunLight.shadow.mapSize.height = 2048;
              sunLight.shadow.camera.near = 100;
              sunLight.shadow.camera.far = 800;
              sunLight.shadow.camera.left = -150;
              sunLight.shadow.camera.right = 150;
              sunLight.shadow.camera.top = 150;
              sunLight.shadow.camera.bottom = -150;
              sunLight.shadow.bias = -0.001;
              scene.add(sunLight);

              // Soft fill light on the dark side
              const ambientLight = new THREE.AmbientLight(0x1a2a4a, 0.4);
              scene.add(ambientLight);

              // Hemisphere light for subtle sky/ground color
              const hemiLight = new THREE.HemisphereLight(0x4488cc, 0x112244, 0.3);
              scene.add(hemiLight);

              // Small sun glow sphere at the sun position
              const sunGlowGeo = new THREE.SphereGeometry(8, 32, 32);
              const sunGlowMat = new THREE.MeshBasicMaterial({ color: 0xfffbe0 });
              const sunGlowMesh = new THREE.Mesh(sunGlowGeo, sunGlowMat);
              sunGlowMesh.position.set(sunX, sunY, sunZ);
              scene.add(sunGlowMesh);

              // Sun corona (lens flare effect with a larger transparent sphere)
              const coronaGeo = new THREE.SphereGeometry(18, 32, 32);
              const coronaMat = new THREE.MeshBasicMaterial({
                color: 0xfff5c0,
                transparent: true,
                opacity: 0.15
              });
              const coronaMesh = new THREE.Mesh(coronaGeo, coronaMat);
              coronaMesh.position.set(sunX, sunY, sunZ);
              scene.add(coronaMesh);

              // Update sun position every 60 seconds
              setInterval(() => {
                const sp = getSunPosition();
                const slr = sp.lat * Math.PI / 180;
                const slnr = sp.lng * Math.PI / 180;
                const sx = sunDist * Math.cos(slr) * Math.sin(slnr);
                const sy = sunDist * Math.sin(slr);
                const sz = sunDist * Math.cos(slr) * Math.cos(slnr);
                sunLight.position.set(sx, sy, sz);
                sunGlowMesh.position.set(sx, sy, sz);
                coronaMesh.position.set(sx, sy, sz);
              }, 60000);

              // Enable shadow rendering
              try {
                const renderer = globe.renderer();
                if (renderer) {
                  renderer.shadowMap.enabled = true;
                  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                }
              } catch(e) {}

              // --- Remove globe.gl default lights and add our own ---
              // Globe.gl adds its own ambient + directional. Remove them to let our sun be the primary light.
              const toRemove = [];
              scene.children.forEach(child => {
                if (child.isAmbientLight && child !== ambientLight) toRemove.push(child);
                if (child.isDirectionalLight && child !== sunLight) toRemove.push(child);
              });
              toRemove.forEach(l => scene.remove(l));

              // --- 3D Cloud Layer ---
              const cloudsGeometry = new THREE.SphereGeometry(101, 80, 80);
              const cloudTexLoader = new THREE.TextureLoader();
              const cloudsTexture = cloudTexLoader.load('https://unpkg.com/three-globe@2.41.2/example/img/earth-clouds.png');
              const cloudsMaterial = new THREE.MeshPhongMaterial({
                map: cloudsTexture,
                transparent: true,
                opacity: 0.35,
                depthWrite: false,
                side: THREE.DoubleSide
              });
              const cloudsMesh = new THREE.Mesh(cloudsGeometry, cloudsMaterial);
              cloudsMesh.receiveShadow = true;
              scene.add(cloudsMesh);

              // Rotate clouds slowly
              (function rotateClouds() {
                cloudsMesh.rotation.y += 0.00008;
                cloudsMesh.rotation.x += 0.00002;
                requestAnimationFrame(rotateClouds);
              })();

              // --- Real-time weather overlay (Open-Meteo precipitation) ---
              // Add precipitation/cloud cover heatmap tile layer as a second globe texture
              try {
                const weatherTexLoader = new THREE.TextureLoader();
                // Use OpenWeatherMap free cloud overlay tiles
                const weatherCloudUrl = 'https://tile.openweathermap.org/map/clouds_new/0/0/0.png?appid=demo';
                // Fallback: use a semi-transparent weather-like overlay
                const overlayGeo = new THREE.SphereGeometry(100.3, 64, 64);
                const overlayMat = new THREE.MeshPhongMaterial({
                  transparent: true,
                  opacity: 0,
                  depthWrite: false
                });
                const overlayMesh = new THREE.Mesh(overlayGeo, overlayMat);
                scene.add(overlayMesh);
              } catch(e) {}

              // --- Deep Space Starfield ---
              const starGeometry = new THREE.BufferGeometry();
              const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.7,
                sizeAttenuation: true
              });
              const starVertices = [];
              for (let i = 0; i < 8000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                if (Math.sqrt(x*x + y*y + z*z) > 300) starVertices.push(x, y, z);
              }
              starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
              const stars = new THREE.Points(starGeometry, starMaterial);
              scene.add(stars);

              // --- Solar System Planets ---
              if (SOLAR_PLANETS && SOLAR_PLANETS.length > 0) {
                const planetMeshes = [];
                // Central Sun (already have sunGlowMesh, but let's make it the center of rotation)
                // Actually the user wants to see planets around the globe.
                // Let's create orbit paths and planets around the center (Earth)
                SOLAR_PLANETS.forEach(pData => {
                  // Planet mesh
                  const pGeo = new THREE.SphereGeometry(pData.radius, 32, 32);
                  const pMat = new THREE.MeshPhongMaterial({
                    color: pData.color,
                    emissive: pData.emissive,
                    shininess: 10
                  });
                  const pMesh = new THREE.Mesh(pGeo, pMat);
                  
                  // Orbit Ring
                  const rGeo = new THREE.RingGeometry(pData.orbitRadius - 0.5, pData.orbitRadius + 0.5, 64);
                  const rMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
                  const rMesh = new THREE.Mesh(rGeo, rMat);
                  rMesh.rotation.x = Math.PI / 2;
                  // Apply slight tilt to orbit
                  rMesh.rotation.y = pData.tilt;
                  scene.add(rMesh);

                  // Pivot for rotation
                  const pivot = new THREE.Object3D();
                  pivot.rotation.z = pData.tilt; // Tilt the orbit plane slightly
                  pivot.add(pMesh);
                  scene.add(pivot);

                  // Add Saturn's ring if applicable
                  if (pData.hasRing) {
                    const satRingGeo = new THREE.RingGeometry(pData.radius * 1.5, pData.radius * 2.5, 32);
                    const satRingMat = new THREE.MeshBasicMaterial({ color: 0xe8d5a3, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
                    const satRing = new THREE.Mesh(satRingGeo, satRingMat);
                    satRing.rotation.x = Math.PI / 2;
                    pMesh.add(satRing);
                  }

                  // Initial offset
                  const startAngle = Math.random() * Math.PI * 2;
                  pMesh.position.set(Math.cos(startAngle) * pData.orbitRadius, 0, Math.sin(startAngle) * pData.orbitRadius);

                  // Label
                  const labelDiv = document.createElement('div');
                  labelDiv.className = 'planet-label';
                  labelDiv.textContent = pData.name;
                  labelDiv.style.cssText = 'color: rgba(255,255,255,0.7); font-size: 11px; font-family: Inter, sans-serif; pointer-events: none; white-space: nowrap; transform: translate(-50%, -50%); text-shadow: 0 0 4px rgba(0,0,0,1);';
                  
                  // We can't use HTML2DObject easily without CSS2DRenderer, so we'll just track 3D positions 
                  // and update 2D DOM elements in a render loop, but Globe.gl already has an animation loop.
                  // For simplicity, we just render the 3D meshes for now.

                  planetMeshes.push({ mesh: pMesh, pivot: pivot, data: pData });
                });

                // Animate planets
                (function animatePlanets() {
                  planetMeshes.forEach(p => {
                    p.pivot.rotation.y += p.data.speed;
                    p.mesh.rotation.y += 0.01; // spin on its axis
                  });
                  requestAnimationFrame(animatePlanets);
                })();
              }

            } catch (sceneErr) {
              console.error('Failed to inject Three.js layers:', sceneErr);
            }
          }, 1000);

          // 3. Real-time Google Earth-style Coordinates Display on Hover
          container.addEventListener('mousemove', (event) => {
            const rect = container.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            const coords = globe.toGlobeCoords(x, y);

            const display = document.getElementById('coords-display');
            if (display) {
              if (coords) {
                const { lat, lng } = coords;
                display.textContent = `📍 Lat: ${lat.toFixed(4)}° | Lng: ${lng.toFixed(4)}° | Elev: Sea Level`;
                display.classList.add('visible');
              } else {
                display.classList.remove('visible');
              }
            }
          });
        }
      } catch (err) {
        console.error('Failed to initialize Globe.gl WebGL:', err);
      }

      // 2. Initialize debounced Search autocomplete
      try {
        const input = document.getElementById('search-input');
        const results = document.getElementById('search-results');
        if (input && results) {
          let searchTimeout = null;
          input.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 2) {
              results.classList.remove('visible');
              return;
            }

            searchTimeout = setTimeout(async () => {
              const matches = await searchLocations(query);
              if (matches.length === 0) {
                results.innerHTML = `<div class="search-result-item" style="cursor:default;opacity:0.5;"><div class="result-icon">🔍</div><div class="result-info"><div class="result-name">No results found</div></div></div>`;
              } else {
                results.innerHTML = matches.map((m, idx) => `
                  <div class="search-result-item" data-idx="${idx}" data-lat="${m.lat}" data-lng="${m.lng}">
                    <div class="result-icon">📍</div>
                    <div class="result-info">
                      <div class="result-name">${escapeHtml(m.name)}</div>
                      <div class="result-country">${escapeHtml([m.state, m.country].filter(Boolean).join(', '))}</div>
                    </div>
                  </div>
                `).join('');

                results.querySelectorAll('.search-result-item[data-lat]').forEach(item => {
                  item.addEventListener('click', () => {
                    handleGlobeClick(parseFloat(item.dataset.lat), parseFloat(item.dataset.lng));
                    input.value = '';
                    results.classList.remove('visible');
                  });
                });
              }
              results.classList.add('visible');
            }, 300);
          });

          input.addEventListener('keydown', async (e) => {
            if (e.key === 'Escape') {
              results.classList.remove('visible');
            } else if (e.key === 'Enter') {
              const firstItem = results.querySelector('.search-result-item[data-lat]');
              if (firstItem) {
                handleGlobeClick(parseFloat(firstItem.dataset.lat), parseFloat(firstItem.dataset.lng));
                input.value = '';
                results.classList.remove('visible');
              } else {
                const query = input.value.trim();
                if (query.length >= 2) {
                  const matches = await searchLocations(query);
                  if (matches && matches.length > 0) {
                    const m = matches[0];
                    handleGlobeClick(m.lat, m.lng);
                    input.value = '';
                    results.classList.remove('visible');
                  }
                }
              }
            }
          });

          document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-wrapper')) results.classList.remove('visible');
          });
        }
      } catch (err) {
        console.error('Failed to initialize Search:', err);
      }

      // 3. Load database & history
      try {
        loadSharedDatabase();
      } catch {}

      // 4. Close panel button (with position reset for drag support)
      const closeBtn = document.getElementById('close-weather');
      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          hideWeatherCard();
          // Reset position for next open
          const weatherPanel = document.getElementById('weather-panel');
          if (weatherPanel) {
            setTimeout(() => {
              weatherPanel.style.top = '24px';
              weatherPanel.style.right = '';
            }, 500);
          }
        });
      }

      // 5. Setup temp unit toggle
      const unitToggle = document.getElementById('unit-toggle');
      if (unitToggle) {
        unitToggle.textContent = `°${getUnit()}`;
        unitToggle.addEventListener('click', () => {
          const newUnit = getUnit() === 'C' ? 'F' : 'C';
          setUnit(newUnit);
          unitToggle.textContent = `°${newUnit}`;
          if (currentWeatherData && currentLocationData) {
            showWeatherCard(currentWeatherData, currentLocationData);
          }
        });
      }

      // 5b. Setup I'm Feeling Lucky random fly-to
      const luckyBtn = document.getElementById('lucky-btn');
      if (luckyBtn) {
        luckyBtn.addEventListener('click', () => {
          const randomLat = (Math.random() * 140) - 70;
          const randomLng = (Math.random() * 360) - 180;
          showError('🎲 I\'m Feeling Lucky! Flying to a random destination...');
          handleGlobeClick(randomLat, randomLng);
        });
      }

      // 5c. Make weather panel draggable from the handle
      (function initDragPanel() {
        const panel = document.getElementById('weather-panel');
        const handle = document.getElementById('panel-drag-handle');
        if (!panel || !handle) return;

        let isDragging = false;
        let startX, startY, startRight, startTop;

        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', startDrag, { passive: false });

        function startDrag(e) {
          e.preventDefault();
          isDragging = true;
          panel.classList.add('dragging');

          const touch = e.touches ? e.touches[0] : e;
          startX = touch.clientX;
          startY = touch.clientY;

          const rect = panel.getBoundingClientRect();
          startRight = window.innerWidth - rect.right;
          startTop = rect.top;

          document.addEventListener('mousemove', onDrag);
          document.addEventListener('mouseup', stopDrag);
          document.addEventListener('touchmove', onDrag, { passive: false });
          document.addEventListener('touchend', stopDrag);
        }

        function onDrag(e) {
          if (!isDragging) return;
          e.preventDefault();
          const touch = e.touches ? e.touches[0] : e;
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;

          const newRight = Math.max(0, startRight - dx);
          const newTop = Math.max(0, Math.min(window.innerHeight - 100, startTop + dy));

          panel.style.right = newRight + 'px';
          panel.style.top = newTop + 'px';
        }

        function stopDrag() {
          isDragging = false;
          panel.classList.remove('dragging');
          document.removeEventListener('mousemove', onDrag);
          document.removeEventListener('mouseup', stopDrag);
          document.removeEventListener('touchmove', onDrag);
          document.removeEventListener('touchend', stopDrag);
        }
      })();

      // 6. Setup Modal listeners
      setUpPinModalListeners();

      // Setup mobile history FAB toggler
      const mobileHistoryBtn = document.getElementById('btn-mobile-history');
      if (mobileHistoryBtn) {
        mobileHistoryBtn.addEventListener('click', () => {
          const historyPanel = document.getElementById('history-panel');
          if (historyPanel) {
            const isVisible = historyPanel.classList.toggle('visible');
            if (isVisible) {
              const weatherPanel = document.getElementById('weather-panel');
              if (weatherPanel) weatherPanel.classList.remove('visible');
            }
          }
        });
      }

      // 7. Launch the Extreme Weather Ticker (hottest/coldest places auto-slider) & Clean Caches
      try {
        cleanupExpiredCaches();
        fetchExtremeWeather();
      } catch {}

      // 8. ALWAYS hide initial loading screen
      setTimeout(() => {
        const screen = document.getElementById('loading-screen');
        if (screen) {
          screen.classList.add('loaded');
          setTimeout(() => screen.remove(), 700);
        }
      }, 1500);
    }

    boot();
  </script>
</body>
</html>
